name: Preview

on:
    - pull_request

concurrency: preview-${{ github.ref }}

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build app
              run: npm run build

            - name: Deploy preview
              id: deploy_preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: dist
                  preview-branch: gh-pages
                  comment: false
            - name: Comment with deployment preview link
              if: ${{ success() && steps.deploy_preview.outputs.deployment-action == 'deploy' && steps.deploy_preview.outputs.preview-url != '' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const previewUrl = `${{ steps.deploy_preview.outputs.preview-url }}`;
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: [
                          "## Deployment Preview",
                          "",
                          `Preview URL: ${previewUrl}`,
                        ].join("\n"),
                      });
