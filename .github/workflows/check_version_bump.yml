name: Check version bump

on:
    pull_request:
        paths:
            - src/checklist.js

jobs:
    check-version-bump:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check VERSION was bumped
              run: |
                  BASE_VERSION=$(git show origin/${{ github.base_ref }}:src/checklist.js 2>/dev/null | grep -m1 'const VERSION' | sed 's/.*"\(.*\)".*/\1/')
                  PR_VERSION=$(grep -m1 'const VERSION' src/checklist.js | sed 's/.*"\(.*\)".*/\1/')
                  if [ -z "$PR_VERSION" ]; then
                    echo "::error file=src/checklist.js::Could not extract VERSION from checklist.js. Ensure it is defined as: const VERSION = \"x.y.z\";"
                    exit 1
                  fi
                  if [ -z "$BASE_VERSION" ]; then
                    echo "VERSION introduced as $PR_VERSION (no prior version on base branch) ✓"
                    exit 0
                  fi
                  echo "Base branch version: $BASE_VERSION"
                  echo "PR branch version:   $PR_VERSION"
                  if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
                    echo "::error file=src/checklist.js::src/checklist.js was modified but VERSION was not bumped (still \"$PR_VERSION\"). Please update the VERSION constant."
                    exit 1
                  fi
                  echo "VERSION bumped from $BASE_VERSION to $PR_VERSION ✓"
