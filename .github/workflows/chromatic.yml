name: Chromatic

on:
    pull_request:

permissions:
    contents: read
    pull-requests: write

jobs:
    chromatic:
        name: Run Chromatic
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: 24.14.0
            - name: Install dependencies
              run: npm ci
            - name: Run Chromatic
              id: chromatic
              uses: chromaui/action@latest
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                  onlyChanged: true
            - name: Comment with Chromatic preview link
              if: success() && steps.chromatic.outputs.storybookUrl != ''
              uses: actions/github-script@v7
              with:
                  script: |
                      const storybookUrl = `${{ steps.chromatic.outputs.storybookUrl }}`;
                      const buildUrl = `${{ steps.chromatic.outputs.buildUrl }}`;
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: [
                          "## Chromatic Preview",
                          "",
                          `- Storybook: ${storybookUrl}`,
                          `- Build details: ${buildUrl}`,
                        ].join("\n"),
                      });
